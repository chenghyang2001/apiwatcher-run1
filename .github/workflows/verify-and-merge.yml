name: "Verify Feature + Auto-merge PR"

# Triggered by VPS run_feature_loop.sh via repository_dispatch
# Requires GH_PAT with repo scope to trigger this event
on:
  repository_dispatch:
    types: [vps-coding-complete]

jobs:
  verify-and-merge:
    name: Verify on VPS, then merge or comment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Extract dispatch payload
        id: payload
        run: |
          BRANCH="${{ github.event.client_payload.branch }}"
          ISSUE="${{ github.event.client_payload.issue }}"
          PR="${{ github.event.client_payload.pr }}"
          FIDX="${{ github.event.client_payload.feature_index }}"
          REMAINING="${{ github.event.client_payload.remaining }}"
          EXIT_CODE="${{ github.event.client_payload.exit_code }}"
          echo "branch=${BRANCH}"       >> "$GITHUB_OUTPUT"
          echo "issue=${ISSUE}"         >> "$GITHUB_OUTPUT"
          echo "pr=${PR}"               >> "$GITHUB_OUTPUT"
          echo "fidx=${FIDX}"           >> "$GITHUB_OUTPUT"
          echo "remaining=${REMAINING}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Dispatch: branch=${BRANCH} issue=#${ISSUE} pr=#${PR} fidx=${FIDX}"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify feature passes on VPS
        id: verify
        run: |
          FIDX="${{ steps.payload.outputs.fidx }}"
          FL_PATH="/home/claude/workspace/anthropic-quickstarts/autonomous-coding-linux/generations/apiwatcher_run1/feature_list.json"

          # Use Python one-liner — heredoc content at column 0 breaks YAML block scalar
          PY="import json; d=json.load(open('${FL_PATH}',encoding='utf-8')); s='${FIDX}'.strip(); idx=int(s) if s.isdigit() else -1; e=d[idx] if 0<=idx<len(d) else None; p=bool(e.get('passes',False)) if e else all(x.get('passes',False) for x in d); print('PASSES=true' if p else 'PASSES=false'); desc=e.get('description','unknown')[:80] if e else str(sum(1 for x in d if x.get('passes',False)))+'/'+str(len(d))+' features pass'; print('DESC='+str(desc))"

          RESULT=$(ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
                       "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                       "python3 -c \"$PY\"")

          echo "VPS check: ${RESULT}"
          PASSES=$(echo "$RESULT" | grep '^PASSES=' | cut -d= -f2 | tr -d '[:space:]')
          DESC=$(echo "$RESULT" | grep '^DESC=' | cut -d= -f2-)
          echo "passes=${PASSES}" >> "$GITHUB_OUTPUT"
          echo "desc=${DESC}"     >> "$GITHUB_OUTPUT"

      - name: Check app health on VPS
        id: health
        run: |
          HTTP_CODE=$(ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
                         "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                         "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health" \
                         2>/dev/null || echo "000")
          echo "App health: HTTP ${HTTP_CODE}"
          echo "status_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR and close Issue
        if: steps.verify.outputs.passes == 'true' && steps.health.outputs.healthy == 'true'
        run: |
          PR_NUM="${{ steps.payload.outputs.pr }}"
          ISSUE_NUM="${{ steps.payload.outputs.issue }}"
          REPO="${{ github.repository }}"
          # --repo flag required: runner has no git checkout so gh cannot infer the remote
          gh pr merge "${PR_NUM}" --repo "${REPO}" --squash --delete-branch \
            --subject "feat: Issue #${ISSUE_NUM} - ${{ steps.verify.outputs.desc }}"
          gh issue close "${ISSUE_NUM}" --repo "${REPO}" \
            --comment "Feature implemented and verified. PR #${PR_NUM} squash-merged. Health: HTTP ${{ steps.health.outputs.status_code }}. Feature: ${{ steps.verify.outputs.desc }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Comment failure on PR
        if: steps.verify.outputs.passes != 'true' || steps.health.outputs.healthy != 'true'
        run: |
          PR_NUM="${{ steps.payload.outputs.pr }}"
          REPO="${{ github.repository }}"
          gh pr comment "${PR_NUM}" --repo "${REPO}" \
            --body "Verification failed. passes=${{ steps.verify.outputs.passes }} health=HTTP ${{ steps.health.outputs.status_code }} remaining=${{ steps.payload.outputs.remaining }} exit=${{ steps.payload.outputs.exit_code }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
